name: Server Ops
on:
  workflow_dispatch:
    inputs:
      action:
        description: "Operation to run on the prod host"
        required: true
        type: choice
        options:
          - diagnose
          - cache-census
          - app-logs
          - memory-timeline
          - restart-redis
          - prune-docker
          - stop-builder

concurrency:
  group: deploy-web-app
  cancel-in-progress: false

jobs:
  ops:
    name: ${{ inputs.action }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install Kamal
        run: gem install kamal

      - name: Configure SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Set up SSH known hosts
        run: ssh-keyscan -t ed25519 5.161.124.129 >> ~/.ssh/known_hosts

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Disk usage
        if: inputs.action == 'diagnose'
        run: kamal server exec 'df -h /'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        continue-on-error: true

      - name: Memory usage
        if: inputs.action == 'diagnose'
        run: kamal server exec 'free -h'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        continue-on-error: true

      - name: Container memory usage
        if: inputs.action == 'diagnose'
        run: kamal server exec 'docker stats --no-stream'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        continue-on-error: true

      - name: Redis info (memory, hit rate, evictions)
        if: inputs.action == 'diagnose'
        run: kamal server exec 'docker exec bip-web-redis redis-cli INFO'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        continue-on-error: true

      - name: All containers
        if: inputs.action == 'diagnose'
        run: kamal server exec 'docker ps -a'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        continue-on-error: true

      - name: Redis accessory details
        if: inputs.action == 'diagnose'
        run: kamal accessory details redis
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        continue-on-error: true

      - name: Redis logs
        if: inputs.action == 'diagnose'
        run: kamal accessory logs redis --lines 100
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        continue-on-error: true

      - name: Redis reachable by container name
        if: inputs.action == 'diagnose'
        run: kamal server exec 'docker run --rm --network kamal redis:7-alpine redis-cli -h bip-web-redis ping'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        continue-on-error: true

      # Run logs on a public repo are world-readable, so only error/warn lines
      # may be printed — never raw request logs.
      - name: App logs (errors only)
        if: inputs.action == 'diagnose'
        run: kamal app logs --lines 500 2>&1 | grep -iE "error|warn|fatal" | tail -100 || echo "No error lines in the last 500"
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        continue-on-error: true

      # Deeper errors-only log pull (same public-visibility rule as above).
      - name: App logs (errors only, deep)
        if: inputs.action == 'app-logs'
        run: kamal app logs --lines 5000 2>&1 | grep -iE "error|warn|fatal" | tail -300 || echo "No error lines in the last 5000"
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      # The app emits one "process memory" line per minute (entry.server.tsx).
      # These are four flat integers with no request data, so printing them in
      # a public run log is safe. 1440 lines ≈ a full day of RSS/heap timeline.
      - name: App memory timeline
        if: inputs.action == 'memory-timeline'
        run: kamal app logs --lines 20000 2>&1 | grep -F '"process memory"' | tail -1440 || echo "No memory lines found"
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      # Census of what's resident in redis: keys, MB, and average idle time per
      # key family, plus the biggest individual keys. MEMORY USAGE and OBJECT
      # IDLETIME don't touch LRU access times, so the census doesn't distort
      # what it measures.
      - name: Redis cache census
        if: inputs.action == 'cache-census'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          kamal server exec "docker exec bip-web-redis sh -c 'redis-cli --scan | while read -r k; do echo \"\$(redis-cli MEMORY USAGE \"\$k\") \$(redis-cli OBJECT IDLETIME \"\$k\") \$k\"; done'" > census-raw.txt
          grep -E '^[0-9]+ [0-9]+ ' census-raw.txt > census.txt || { echo "No census lines returned"; exit 1; }
          echo "=== By key family (sorted by MB) ==="
          awk '{ split($3, seg, ":"); fam = seg[1];
                 count[fam]++; bytes[fam] += $1; idle[fam] += $2 }
               END { for (f in count)
                       printf "%-22s %6d keys %9.1f MB  avg idle %6.1f h\n",
                              f, count[f], bytes[f]/1048576, idle[f]/count[f]/3600 }' census.txt \
            | sort -k4 -rn
          echo ""
          echo "=== Top 15 keys by size ==="
          sort -rn census.txt | head -15 \
            | awk '{ printf "%8.2f MB  idle %7.1f h  %s\n", $1/1048576, $2/3600, $3 }'
          echo ""
          echo "=== Totals ==="
          awk '{ n++; b += $1 } END { printf "%d keys, %.1f MB\n", n, b/1048576 }' census.txt

      - name: Reboot redis accessory
        if: inputs.action == 'restart-redis'
        run: kamal accessory reboot redis
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Redis status after reboot
        if: inputs.action == 'restart-redis'
        run: |
          kamal accessory details redis
          kamal accessory logs redis --lines 50
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Prune unused Docker data
        if: inputs.action == 'prune-docker'
        run: kamal server exec 'docker system prune -af'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      # The co-located coaching-tree app deploys via a Kamal remote builder,
      # which leaves its buildx builder container running (and holding
      # ~645MiB) between deploys. Stopping it is safe: buildx bootstraps a
      # fresh builder on the next remote build, and the running app container
      # is untouched.
      - name: Stop idle buildx builder containers
        if: inputs.action == 'stop-builder'
        run: kamal server exec 'docker ps -q --filter name=buildx_buildkit | xargs -r docker stop'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Memory after builder stop
        if: inputs.action == 'stop-builder'
        run: |
          kamal server exec 'docker stats --no-stream'
          kamal server exec 'free -h'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Disk usage after prune
        if: inputs.action == 'prune-docker'
        run: kamal server exec 'df -h /'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
